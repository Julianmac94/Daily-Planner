<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#16181f">
  <title>Daily Planner</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <div id="app">

    <header id="app-header">
      <div class="header-left">
        <span id="header-date"></span>
      </div>
      <div class="header-right">
        <span id="header-fast"></span>
      </div>
    </header>

    <main id="view-today" class="view active"></main>
    <main id="view-shop"  class="view"></main>
    <main id="view-plan"  class="view"></main>

    <nav id="tab-bar">
      <button class="tab-btn active" data-tab="today">
        <span class="tab-icon">☀️</span>
        <span class="tab-label">Today</span>
      </button>
      <button class="tab-btn" data-tab="shop">
        <span class="tab-icon">🛒</span>
        <span class="tab-label">Shop</span>
      </button>
      <button class="tab-btn" data-tab="plan">
        <span class="tab-icon">📅</span>
        <span class="tab-label">Plan</span>
      </button>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="data/products.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/food.js"></script>
  <script src="js/shopping.js"></script>
  <script src="js/plan.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
