<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#141418">
  <title>Daily Planner</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="app-shell">

  <div class="app-header">
    <div class="app-title">Daily Planner</div>
    <div class="app-subtitle" id="header-sub">Loading...</div>
  </div>

  <div class="tab-area">

    <div class="tab-content active" id="tab-today">
      <div id="today-content"><div class="loading">Loading...</div></div>
    </div>

    <div class="tab-content" id="tab-shop">
      <div id="shop-content"><div class="loading">Loading...</div></div>
    </div>

    <div class="tab-content" id="tab-plan">
      <div id="plan-content"><div class="loading">Loading...</div></div>
    </div>

  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="today" onclick="showTab('today')">
      <span class="nav-icon">☀️</span>
      Today
    </button>
    <button class="nav-btn" data-tab="shop" onclick="showTab('shop')">
      <span class="nav-icon">🛒</span>
      Shop
    </button>
    <button class="nav-btn" data-tab="plan" onclick="showTab('plan')">
      <span class="nav-icon">📋</span>
      Plan
    </button>
  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="data/products.js"></script>
<script src="js/supabase.js"></script>
<script src="js/food.js"></script>
<script src="js/shopping.js"></script>
<script src="js/plan.js"></script>
<script src="js/app.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const sub = document.getElementById('header-sub');
    if (sub) {
      sub.textContent = new Date().toLocaleDateString('en-AU', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
    }
  });
</script>

</body>
</html>
